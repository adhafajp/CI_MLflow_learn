name: CI
 
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CSV_URL: "MLproject/train_pca.csv"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Mengambil kode dari repositori
      - uses: actions/checkout@v4

      # Setup Python 3.12.7
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      # Check Env Variables
      - name: Check Env
        run: |
          echo $CSV_URL

      # Install mlflow
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow

      # Run as a mlflow project
      - name: Run mlflow project
        run: |
          mlflow run MLproject --env-manager=local 

      # ==========================================
      # [DITUNDA] Bagian Google Drive dinonaktifkan sementara
      # ==========================================
      
      # - name: Install Google Drive dependencies
      #   run: |
      #     pip install --upgrade google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client
        
      # - name: Upload to Google Drive
      #   env:
      #     GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
      #     GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
      #   run: |
      #     python MLproject/upload_to_gdrive.py

      # ==========================================

      # Save models to GitHub Repository (Aktif sebagai penyimpanan sementara)
      - name: Save mlruns to repo
        run: |
          git config --global user.name ${{ secrets.username }}
          git config --global user.email ${{ secrets.email }}
          git add -f mlruns/
          git commit -m "Save mlruns from CI run"
          git push origin main